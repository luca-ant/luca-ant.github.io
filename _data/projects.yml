- name: Gaze Traker
  github: https://github.com/luca-ant/gaze_tracker
  image: /assets/images/portfolio/gaze_tracker.gif
  tag: Computer Vision
  description: This project is an experiment on gaze tracker system, based on the position of glint on the iris, which is the reflection of a source of light located near the camera. By tracking the glint it is possible to estimate the gaze position on the screen and use this position as an input system, for instance to move the mouse arrow.
