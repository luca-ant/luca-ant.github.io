---
title: Portfolio
layout: default
---

<div class="container-fluid text-white text-center mb-0 py-5 " id="portfolio">

    <h2 class="page-section-heading text-center text-uppercase text-secondary mb-0">Portfolio</h2>
    <!-- Icon Divider-->
    <div class="divider-custom">
        <div class="divider-custom-line"></div>
        <div class="divider-custom-icon"><span class="fab fa-wolf-pack-battalion"></span></div>
        <div class="divider-custom-line"></div>
    </div>
    

    <div class="card-columns">

        {% for item in site.data.projects %}

        <div class="card my-card text-white bg-primary my-3">

            <div class="card-header">
                <p class="card-text"> {{ item.tag }} </p>
            </div>

            <div class="card-body">     

                <div class="card bg-primary border-0">
                    <img class="card-img" src="{{ item.image }}" alt="">
                </div>

                <h4 class="card-title mb-0 py-3">{{ item.name }}</h4>

                <div class="text-white pb-0">              
                    <p class="card-text"> {{ item.description }} </p>
                </div>

            </div>

            <div class="card-footer">

                <button type="button" class="btn my-bg-dark">
                    <a class="text-white card-link mb-0 mt-0" href="{{ item.github }}">
                    <span class="fab fa-github"></span> GitHub</a>
                </button>

                </div>
            </div>

        {% endfor %}

    </div>
        
</div>
