---
title: Home
layout: default
---


<div class="masthead my-bg-image animate-bg">
    <div class="container d-flex align-items-center flex-column text-center text-white">
        <!-- Avatar Image-->
        <img class="masthead-avatar mb-5" src="assets/images/avatar.png" alt="" />
        <!-- Heading-->
        <h1 class="masthead-heading text-uppercase mb-0"> {{site.title}} </h1>
        <!-- Icon Divider-->
        <div class="divider-custom divider-light">
            <div class="divider-custom-line"></div>
            <div class="divider-custom-icon">
                <i class="fas fa-feather"></i>       
            </div>
            <div class="divider-custom-line"></div>
        </div>
        <!-- Subheading-->
        <p class="masthead-subheading font-weight-light mb-0"> {{ site.subtitle }} </p>
    </div>
</div>
