<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="{{site.author}}" />
        

        {% if page.title %}
        <title> {{ page.title }} | {{ site.title }} </title>
        {% else %}
        <title> {{ site.title }} | {{site.subtitle}} </title>
        {% endif %}

        <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />

        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css" />

        <!-- <link href="assets/css/bootstrap.css" rel="stylesheet" /> -->
        <link href="assets/css/bootstrap.min.css" rel="stylesheet" />
        <link href="assets/css/mystyle.css" rel="stylesheet" />

        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-D0T6Y56YZ4"></script>
        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-D0T6Y56YZ4');
        </script>
    

    </head>
    <body id="page">

        {% include navigation.html %}    

        {{ content }}

        {% include footer.html %}    

        
        <div id="back-to-top" class="back-to-top">
            <a href="#" class="btn btn-dark btn-lg d-block text-center js-scroll-trigger" role="button"><i class="fas fa-chevron-up"></i></a>

        </div>
        
        <script src="/assets/js/jquery-3.6.0.min.js"></script>
        <!-- <script src="/assets/js/popper.min.js"></script> -->
        <!-- <script src="/assets/js/jquery.easing.min.js"></script> -->
        <!-- <script src="/assets/js/bootstrap.js"></script> -->
        <script src="/assets/js/bootstrap.min.js"></script>
        <script src="/assets/js/scripts.js"></script>
        
    </body>
</html>
